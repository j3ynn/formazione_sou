---
# tasks file for Backup

- name: install python e mariadb
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - mariadb-server
      - mariadb-client
    state: present

- name: avvio mariadb
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true # per avviarlo automaticamente al reboot, boolean o true o false 

- name: database creazione e popolazione
  ansible.builtin.shell: |
    mariadb <<'SQL'
    CREATE DATABASE IF NOT EXISTS database;
    USE database;
    CREATE TABLE IF NOT EXISTS utenti (
      id INT AUTO_INCREMENT PRIMARY KEY,
      nome VARCHAR(50),
      email VARCHAR(100)
    );
    TRUNCATE TABLE utenti;
    INSERT INTO utenti (nome, email) VALUES
      ('catiuscia', 'catiuscia@test.com'),
      ('federico', 'federico@test.com'),
      ('stelladellaserata', 'stelladellaserata@test.com');
    CREATE USER IF NOT EXISTS '{{ userdb }}'@'localhost' IDENTIFIED BY '{{ passwordb }}';
    GRANT ALL PRIVILEGES ON database.* TO '{{ userdb }}'@'localhost';
    FLUSH PRIVILEGES;
    SQL

- name: crea backup reindirizzando l'output in un file
  ansible.builtin.shell: 
    cmd: mariadb-dump --database database > /tmp/database.sql

- name: trasferisco dati
  ansible.builtin.shell: 
    cmd: "scp /tmp/database.sql vagrant@192.168.100.12:/tmp/database.sql"
  become: false